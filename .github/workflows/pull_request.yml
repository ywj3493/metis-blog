name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.2
      - name: Run Biome
        run: biome ci .

  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --run

      - name: Build
        run: pnpm build
        env:
          CI_MOCK: "true"
          NOTION_KEY: mock_key
          NOTION_POST_DATABASE_ID: mock_db_id
          NOTION_TOKEN_V2: mock_token
          NOTION_USER_ID: mock_user
          NOTION_GUESTBOOK_DATABASE_ID: mock_guestbook_db
          NOTION_ABOUT_PAGE_ID: mock_about_page
